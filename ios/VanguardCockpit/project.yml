# XcodeGen — from this directory: xcodegen generate
# Install: brew install xcodegen  →  https://github.com/yonaskolb/XcodeGen
name: VanguardCockpit
options:
  bundleIdPrefix: com.ragstone.vanguard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
targets:
  VanguardCockpit:
    type: application
    platform: iOS
    sources:
      - path: Sources/VanguardCockpit
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        ENABLE_TESTABILITY: YES
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.ragstone.vanguard.cockpit
        INFOPLIST_KEY_CFBundleDisplayName: Vanguard Cockpit
        INFOPLIST_KEY_NSFamilyControlsUsageDescription: Vanguard Cockpit uses Screen Time to enforce focus shields and scheduled digital boundaries you configure.
        INFOPLIST_KEY_NSHealthShareUsageDescription: Optional Health metrics for sovereignty baselines when you enable them.
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: Optional Health updates when you enable physical baseline tracking.
        INFOPLIST_KEY_NSMotionUsageDescription: Posture awareness uses device motion while the app is active.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Optional visit-based doorway checks when you enable location.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Sources/VanguardCockpit/VanguardCockpit.entitlements
    dependencies:
      - target: DeviceActivityMonitor
        embed: true
  DeviceActivityMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/DeviceActivityMonitor
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ragstone.vanguard.cockpit.monitor
        INFOPLIST_FILE: Sources/DeviceActivityMonitor/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/DeviceActivityMonitor/DeviceActivityMonitor.entitlements
  VanguardCockpitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/VanguardCockpitTests
    dependencies:
      - target: VanguardCockpit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ragstone.vanguard.cockpit.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VanguardCockpit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VanguardCockpit"
        BUNDLE_LOADER: "$(TEST_HOST)"

# Shared schemes so CLI `xcodebuild` and Xcode both see runnable destinations (not only implicit schemes).
schemes:
  VanguardCockpit:
    build:
      targets:
        VanguardCockpit: all
        DeviceActivityMonitor: all
    run:
      config: Debug
      executable: VanguardCockpit
    test:
      config: Debug
      gatherCoverageData: false
      macroExpansion: VanguardCockpit
      targets:
        - VanguardCockpitTests
    profile:
      config: Release
      executable: VanguardCockpit
